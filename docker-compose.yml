services:
  # Backend API Service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: werewolf-backend
    restart: unless-stopped
    ports:
      - "8082:8000"
    environment:
      # Default LLM Configuration
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-}
      - LLM_MODEL=${LLM_MODEL:-gpt-4o-mini}
      - LLM_MAX_RETRIES=${LLM_MAX_RETRIES:-2}
      - LLM_USE_MOCK=${LLM_USE_MOCK:-false}

      # Application Settings
      - DEBUG=${DEBUG:-false}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}

      # Multi-Provider Configuration (Optional)
      # OpenAI
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}

      # Anthropic (Claude)
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - ANTHROPIC_BASE_URL=${ANTHROPIC_BASE_URL:-}
      - ANTHROPIC_MODEL=${ANTHROPIC_MODEL:-claude-3-haiku-20240307}

      # DeepSeek
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - DEEPSEEK_BASE_URL=${DEEPSEEK_BASE_URL:-https://api.deepseek.com/v1}
      - DEEPSEEK_MODEL=${DEEPSEEK_MODEL:-deepseek-chat}

      # Moonshot (Kimi)
      - MOONSHOT_API_KEY=${MOONSHOT_API_KEY:-}
      - MOONSHOT_BASE_URL=${MOONSHOT_BASE_URL:-https://api.moonshot.cn/v1}
      - MOONSHOT_MODEL=${MOONSHOT_MODEL:-moonshot-v1-8k}

      # Qwen (Alibaba)
      - QWEN_API_KEY=${QWEN_API_KEY:-}
      - QWEN_BASE_URL=${QWEN_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1}
      - QWEN_MODEL=${QWEN_MODEL:-qwen-turbo}

      # GLM (Zhipu)
      - GLM_API_KEY=${GLM_API_KEY:-}
      - GLM_BASE_URL=${GLM_BASE_URL:-https://open.bigmodel.cn/api/paas/v4}
      - GLM_MODEL=${GLM_MODEL:-glm-4-flash}

      # Doubao (ByteDance)
      - DOUBAO_API_KEY=${DOUBAO_API_KEY:-}
      - DOUBAO_BASE_URL=${DOUBAO_BASE_URL:-}
      - DOUBAO_MODEL=${DOUBAO_MODEL:-doubao-pro-4k}

      # MiniMax
      - MINIMAX_API_KEY=${MINIMAX_API_KEY:-}
      - MINIMAX_BASE_URL=${MINIMAX_BASE_URL:-}
      - MINIMAX_MODEL=${MINIMAX_MODEL:-abab6.5s-chat}

      # Custom Providers (AI_PROVIDER_1, AI_PROVIDER_2, etc.)
      - AI_PROVIDER_1_NAME=${AI_PROVIDER_1_NAME:-}
      - AI_PROVIDER_1_API_KEY=${AI_PROVIDER_1_API_KEY:-}
      - AI_PROVIDER_1_BASE_URL=${AI_PROVIDER_1_BASE_URL:-}
      - AI_PROVIDER_1_MODEL=${AI_PROVIDER_1_MODEL:-}

      - AI_PROVIDER_2_NAME=${AI_PROVIDER_2_NAME:-}
      - AI_PROVIDER_2_API_KEY=${AI_PROVIDER_2_API_KEY:-}
      - AI_PROVIDER_2_BASE_URL=${AI_PROVIDER_2_BASE_URL:-}
      - AI_PROVIDER_2_MODEL=${AI_PROVIDER_2_MODEL:-}

      # Player to Provider Mapping
      # JSON format: {"2":"openai","3":"anthropic","4":"deepseek",...}
      - AI_PLAYER_MAPPING=${AI_PLAYER_MAPPING:-}

      # Or individual mappings
      - AI_PLAYER_2_PROVIDER=${AI_PLAYER_2_PROVIDER:-}
      - AI_PLAYER_3_PROVIDER=${AI_PLAYER_3_PROVIDER:-}
      - AI_PLAYER_4_PROVIDER=${AI_PLAYER_4_PROVIDER:-}
      - AI_PLAYER_5_PROVIDER=${AI_PLAYER_5_PROVIDER:-}
      - AI_PLAYER_6_PROVIDER=${AI_PLAYER_6_PROVIDER:-}
      - AI_PLAYER_7_PROVIDER=${AI_PLAYER_7_PROVIDER:-}
      - AI_PLAYER_8_PROVIDER=${AI_PLAYER_8_PROVIDER:-}
      - AI_PLAYER_9_PROVIDER=${AI_PLAYER_9_PROVIDER:-}
    networks:
      - werewolf-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Frontend Web Service
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=
    container_name: werewolf-frontend
    restart: unless-stopped
    ports:
      - "8081:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - werewolf-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

networks:
  werewolf-network:
    driver: bridge
